<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Management Dashboard</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel for Browser Execution -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // Custom Icon Component to bridge Lucide and React
        const Icon = ({ name, size = 20, className = "" }) => {
            const [iconHtml, setIconHtml] = useState("");
            useEffect(() => {
                const icon = lucide.icons[name];
                if (icon) {
                    const svg = lucide.createIcons({
                        icons: { [name]: icon },
                        attrs: { strokeWidth: 2, width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            
            // Using standard SVG fallback since Lucide React isn't easily bundled in CDN
            const icons = {
                LayoutColumns: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18"/><path d="M15 3v18"/></svg>,
                CheckCircle2: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>,
                Clock: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
                Plus: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="M12 5v14"/></svg>,
                Trash2: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>,
                ChevronRight: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>,
                BarChart3: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>,
                Calendar: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>,
                Search: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            };
            return icons[name] || null;
        };

        const App = () => {
            const [tasks, setTasks] = useState([
                { id: '1', title: 'Design System Update', status: 'In Progress', priority: 'High', dueDate: '2024-06-20', category: 'Design' },
                { id: '2', title: 'API Integration', status: 'To Do', priority: 'Medium', dueDate: '2024-06-25', category: 'Development' },
                { id: '3', title: 'Client Feedback Review', status: 'Done', priority: 'Low', dueDate: '2024-06-15', category: 'Product' }
            ]);

            const [isModalOpen, setIsModalOpen] = useState(false);
            const [newTask, setNewTask] = useState({ title: '', status: 'To Do', priority: 'Medium', category: 'General' });

            const stats = useMemo(() => {
                const total = tasks.length;
                const completed = tasks.filter(t => t.status === 'Done').length;
                const progress = total === 0 ? 0 : Math.round((completed / total) * 100);
                return { total, completed, progress };
            }, [tasks]);

            const addTask = (e) => {
                e.preventDefault();
                if (!newTask.title) return;
                setTasks([...tasks, { ...newTask, id: Date.now().toString(), dueDate: '2024-07-01' }]);
                setIsModalOpen(false);
                setNewTask({ title: '', status: 'To Do', priority: 'Medium', category: 'General' });
            };

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    {/* Sidebar */}
                    <div className="w-full md:w-64 bg-white border-r p-6 hidden md:block">
                        <div className="flex items-center gap-3 mb-10">
                            <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold">P</div>
                            <span className="font-bold text-xl">ProjectX</span>
                        </div>
                        <nav className="space-y-2">
                            <div className="flex items-center gap-3 px-4 py-3 rounded-xl bg-indigo-50 text-indigo-700 font-medium">
                                <Icon name="LayoutColumns" /> <span>Dashboard</span>
                            </div>
                            <div className="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 hover:bg-slate-50">
                                <Icon name="BarChart3" /> <span>Analytics</span>
                            </div>
                        </nav>
                    </div>

                    {/* Main */}
                    <main className="flex-1 p-6 md:p-10">
                        <header className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-10">
                            <div>
                                <h1 className="text-3xl font-bold">Workspace</h1>
                                <p className="text-slate-500">Track and manage project tasks.</p>
                            </div>
                            <button 
                                onClick={() => setIsModalOpen(true)}
                                className="bg-indigo-600 text-white px-5 py-2.5 rounded-xl flex items-center gap-2 hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-200"
                            >
                                <Icon name="Plus" size={18} /> New Task
                            </button>
                        </header>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                            <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                                <div className="text-slate-400 text-sm mb-1">Active Tasks</div>
                                <div className="text-3xl font-bold text-slate-800">{stats.total}</div>
                            </div>
                            <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                                <div className="text-slate-400 text-sm mb-1">Completed</div>
                                <div className="text-3xl font-bold text-emerald-600">{stats.completed}</div>
                            </div>
                            <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                                <div className="text-slate-400 text-sm mb-1">Progress</div>
                                <div className="flex items-center gap-3">
                                    <div className="text-3xl font-bold">{stats.progress}%</div>
                                    <div className="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                                        <div className="h-full bg-indigo-500" style={{width: `${stats.progress}%`}}></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            {['To Do', 'In Progress', 'Done'].map(status => (
                                <div key={status}>
                                    <h3 className="font-bold text-slate-700 mb-4 flex items-center justify-between uppercase text-xs tracking-wider">
                                        {status}
                                        <span className="bg-slate-200 px-2 py-0.5 rounded text-slate-500">{tasks.filter(t => t.status === status).length}</span>
                                    </h3>
                                    <div className="space-y-4">
                                        {tasks.filter(t => t.status === status).map(task => (
                                            <div key={task.id} className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm hover:border-indigo-300 transition-all cursor-pointer">
                                                <div className="flex justify-between items-start mb-3">
                                                    <span className="text-[10px] font-bold text-indigo-500 bg-indigo-50 px-2 py-1 rounded uppercase tracking-tighter">{task.category}</span>
                                                    <div className={`w-2 h-2 rounded-full ${task.priority === 'High' ? 'bg-red-500' : 'bg-amber-500'}`}></div>
                                                </div>
                                                <h4 className="font-semibold text-slate-800 mb-4 leading-tight">{task.title}</h4>
                                                <div className="flex items-center justify-between pt-4 border-t border-slate-50">
                                                    <div className="flex items-center gap-1.5 text-slate-400 text-xs">
                                                        <Icon name="Calendar" size={12} /> {task.dueDate}
                                                    </div>
                                                    <div className="flex gap-1">
                                                        <button onClick={() => setTasks(tasks.filter(t => t.id !== task.id))} className="p-1 hover:text-red-500"><Icon name="Trash2" size={14}/></button>
                                                        {status !== 'Done' && (
                                                            <button 
                                                                onClick={() => setTasks(tasks.map(t => t.id === task.id ? {...t, status: status === 'To Do' ? 'In Progress' : 'Done'} : t))}
                                                                className="p-1 hover:text-indigo-600"
                                                            >
                                                                <Icon name="ChevronRight" size={14}/>
                                                            </button>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* Simple Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
                            <div className="bg-white rounded-3xl w-full max-w-md p-8 shadow-2xl">
                                <h2 className="text-2xl font-bold mb-6">New Project Task</h2>
                                <form onSubmit={addTask} className="space-y-4">
                                    <input 
                                        className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500" 
                                        placeholder="Task title..."
                                        value={newTask.title}
                                        onChange={e => setNewTask({...newTask, title: e.target.value})}
                                    />
                                    <div className="grid grid-cols-2 gap-4">
                                        <select className="p-4 bg-slate-50 border rounded-2xl" value={newTask.priority} onChange={e => setNewTask({...newTask, priority: e.target.value})}>
                                            <option>Low</option>
                                            <option>Medium</option>
                                            <option>High</option>
                                        </select>
                                        <select className="p-4 bg-slate-50 border rounded-2xl" value={newTask.category} onChange={e => setNewTask({...newTask, category: e.target.value})}>
                                            <option>Design</option>
                                            <option>Development</option>
                                            <option>Product</option>
                                        </select>
                                    </div>
                                    <div className="flex gap-3 pt-4">
                                        <button type="button" onClick={() => setIsModalOpen(false)} className="flex-1 p-4 font-bold text-slate-500 hover:bg-slate-100 rounded-2xl">Cancel</button>
                                        <button type="submit" className="flex-1 p-4 font-bold bg-indigo-600 text-white rounded-2xl shadow-lg">Create</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
